name: Build Linux

on:
  push:
    branches: [linux-support]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-tk libgtk-3-0 libappindicator3-1 gir1.2-appindicator3-0.1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build tarball
        run: |
          chmod +x build_linux.sh
          ./build_linux.sh tarball

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheevopresence-linux-tarball
          path: dist/linux/*.tar.gz

      - name: Install appimagetool
        run: |
          sudo apt install -y libfuse2
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

      - name: Build AppImage
        run: |
          PATH="/tmp:$PATH" ./build_linux.sh appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheevopresence-linux-appimage
          path: dist/linux/*.AppImage

      - name: Build DEB
        run: |
          ./build_linux.sh deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: cheevopresence-linux-deb
          path: dist/linux/*.deb
